skill_id: scenario.secret-lockdown
topic: cross
type: scenario
skills:
  - grep.recursive-search
  - grep.fixed-string
  - perms.getfacl-output
  - perms.acl-readonly
  - perms.acl-revoke
steps:
  - "An old credential string `{{secret}}` was flagged as leaked. Find every file under {{dir}} (recursively) that still contains it literally — treat it as a fixed string, not a regex, since it may contain characters like '.' or '+'."
  - "For the file(s) you found, run getfacl and read the current state: note any named user/group ACL entries already present."
  - "Remove any named ACL entries that do NOT belong to {{user}} — only {{user}} should retain access."
  - "Grant {{user}} read-only ACL access to the file (do not change owner/group/other bits)."
  - "Verify: getfacl on the file shows exactly one named entry — `user:{{user}}:r--` — and no other named user/group entries remain."
variants:
  - template: "Lock down the file containing the leaked credential `{{secret}}` under {{dir}} so only {{user}} can read it via ACL, with no other named ACL entries left over."
    success_criteria: "Exactly one named ACL entry remains on the affected file: `user:{{user}}:r--`. No other named user/group entries. Owner/group/other bits unchanged."
    reference_solution:
      commands: |
        grep -rlF "{{secret}}" {{dir}}
        getfacl <matched_file>
        # for each unwanted named entry shown above:
        setfacl -x u:<other_user> <matched_file>
        setfacl -x g:<other_group> <matched_file>
        setfacl -m u:{{user}}:r-- <matched_file>
        getfacl <matched_file>
      why: "grep -rlF finds the affected file(s) by literal match without regex surprises. getfacl shows what's currently granted. setfacl -x strips unwanted named entries surgically; setfacl -m u:USER:r-- grants the one access that should remain, all without touching owner/group/other."
param_generator:
  secret: ["sk_live_4242", "db.pass=hunter2", "10.0.0.99:secret"]
  dir: [/etc/app, /opt/app, /srv/app]
  user: [audit, ci, deploy]
